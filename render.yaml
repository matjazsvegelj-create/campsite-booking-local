services:
  - type: web
    name: campsite-booking-local
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
